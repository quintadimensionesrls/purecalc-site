<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureCalc.io - Networking Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Componente Principale
        const { useState, useEffect } = React;

function App() {
    const [allTools, setAllTools] = useState([]); // Memorizziamo tutto il database
    const [currentData, setCurrentData] = useState(null);
    const [isHome, setIsHome] = useState(true);
    const [copied, setCopied] = useState(false);

    useEffect(() => {
        fetch('/data.json')
            .then(response => response.json())
            .then(json => {
                setAllTools(json);
                
                // Capiamo dove si trova l'utente
                const pathSlug = window.location.pathname.split('/').pop();
                
                if (pathSlug && pathSlug !== "" && pathSlug !== "index.html") {
                    const tool = json.find(t => t.slug === pathSlug);
                    if (tool) {
                        setCurrentData(tool);
                        setIsHome(false);
                        document.title = tool.title + " | PureCalc.io";
                    }
                } else {
                    setIsHome(true);
                    document.title = "PureCalc.io | All Networking & Tech Tools";
                }
            })
            .catch(err => console.error("Errore:", err));
    }, []);

    const copyToClipboard = (text) => {
        navigator.clipboard.writeText(text);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
    };

    // --- VISTA HOME (L'INDICE) ---
    const HomeView = () => (
        <div className="max-w-6xl mx-auto py-12 px-4">
            <header className="mb-12 text-center">
                <h1 className="text-4xl font-extrabold text-slate-900 mb-4 tracking-tight">
                    Free Online Professional Calculators
                </h1>
                <p className="text-slate-600 text-lg max-w-2xl mx-auto">
                    A collection of high-precision tools for network engineers, developers, and tech enthusiasts.
                </p>
            </header>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {allTools.map(tool => (
                    <a key={tool.slug} href={`/convert/${tool.slug}`} className="block group">
                        <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-md hover:border-blue-300 transition-all">
                            <div className="flex justify-between items-start mb-4">
                                <span className="bg-blue-50 text-blue-600 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-widest">
                                    Networking
                                </span>
                                <div className="text-slate-300 group-hover:text-blue-500 transition-colors">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                                </div>
                            </div>
                            <h2 className="text-lg font-bold text-slate-800 group-hover:text-blue-600 transition-colors">
                                {tool.title}
                            </h2>
                            <p className="text-slate-500 text-sm mt-2 line-clamp-2">
                                Professional calculator for {tool.from_unit} prefix and subnetting details.
                            </p>
                        </div>
                    </a>
                ))}
            </div>
        </div>
    );

    // --- RENDERIZZA IL CONTENUTO ---
    return (
        <div className="min-h-screen font-sans bg-slate-50">
            {/* NAVBAR */}
            <nav className="bg-white border-b border-slate-200 p-4 sticky top-0 z-50">
                <div className="max-w-6xl mx-auto flex justify-between items-center">
                    <a href="/" className="font-black text-xl text-blue-600 tracking-tighter hover:opacity-80">
                        PureCalc.io
                    </a>
                    <div className="hidden md:flex gap-6 text-sm font-medium text-slate-500">
                        <a href="/" className="hover:text-blue-600">Home</a>
                        <a href="/sitemap.xml" className="hover:text-blue-600">Sitemap</a>
                    </div>
                </div>
            </nav>

            {isHome ? <HomeView /> : (
                /* QUI VA IL CODICE DELLA TOOL CARD CHE ABBIAMO GIÀ FATTO */
                /* (Sostituisci questa parte col div della card che hai già funzionante) */
                <main className="max-w-4xl mx-auto py-8 px-4">
                    {/* ... la tua card attuale ... */}
                </main>
            )}
            
            {/* FOOTER */}
            <footer className="mt-20 border-t border-slate-200 py-10 text-center text-slate-400 text-sm">
                &copy; 2026 PureCalc.io - High Precision Infrastructure Tools
            </footer>
        </div>
    );
}

            // Carichiamo i dati dal tuo file data.json
            useEffect(() => {
    // Cerchiamo il parametro "page" o l'ultima parte dell'URL
    const urlParams = new URLSearchParams(window.location.search);
    const pageParam = urlParams.get('page');
    const pathSlug = window.location.pathname.split('/').pop();
    
    const targetSlug = pageParam || pathSlug || 'cidr-to-subnet-mask-slash-24';

    fetch('/data.json')
        .then(response => response.json())
        .then(json => {
            const currentTool = json.find(t => t.slug === targetSlug) || json[0];
            setData(currentTool);
            document.title = currentTool.title + " | PureCalc.io";
        })
        .catch(err => console.error("Errore caricamento:", err));
}, []);

            if (!data) return <div class="p-10 text-center font-sans">Loading awesome tools...</div>;

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const calculateWildcard = (mask) => mask.split('.').map(o => 255 - parseInt(o)).join('.');

            return (
                <div className="min-h-screen font-sans">
                    {/* NAVBAR */}
                    <nav className="bg-white border-b border-slate-200 p-4 sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto flex justify-between items-center font-bold text-blue-600">
                            PureCalc.io
                        </div>
                    </nav>

                    <main className="max-w-4xl mx-auto py-8 px-4">
                        <div className="bg-white border border-slate-200 rounded-2xl shadow-xl overflow-hidden">
                            <div className="p-6 border-b border-slate-100 bg-slate-50/50">
                                <h1 className="text-3xl font-extrabold text-slate-800">{data.title}</h1>
                                <span className="inline-block mt-2 bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-widest">Networking Tool</span>
                            </div>

                            <div className="p-8 flex flex-col md:flex-row items-center justify-between gap-10">
                                <div>
                                    <label className="text-[10px] font-black uppercase tracking-[0.2em] text-blue-500 block mb-2">Subnet Mask</label>
                                    <div className="flex items-center gap-4">
                                        <code className="text-4xl md:text-5xl font-mono font-bold text-slate-900 tracking-tight">{data.data.mask}</code>
                                        <button onClick={() => copyToClipboard(data.data.mask)} className="p-3 bg-slate-100 hover:bg-blue-600 hover:text-white rounded-xl transition-all">
                                            {copied ? "✅" : "📋"}
                                        </button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-8 border-t md:border-t-0 md:border-l border-slate-100 pt-6 md:pt-0 md:pl-10 w-full md:w-auto">
                                    <div>
                                        <label className="text-[10px] font-bold uppercase text-slate-400 block">Total IPs</label>
                                        <p className="text-2xl font-mono font-bold text-slate-800">{data.data.hosts}</p>
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold uppercase text-slate-400 block">Usable Hosts</label>
                                        <p className="text-2xl font-mono font-bold text-emerald-500">{data.data.usable}</p>
                                    </div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 border-t border-slate-100">
                                <div className="p-6 bg-slate-900 text-emerald-400">
                                    <h3 className="text-slate-400 text-xs font-bold uppercase mb-3">Binary Representation</h3>
                                    <code className="font-mono text-sm break-all">{data.data.binary}</code>
                                </div>
                                <div className="p-6 space-y-4 text-sm">
                                    <div className="flex justify-between font-medium">
                                        <span className="text-slate-500">Wildcard Mask</span>
                                        <code className="text-slate-700 font-bold">{calculateWildcard(data.data.mask)}</code>
                                    </div>
                                    <div className="flex justify-between font-medium">
                                        <span className="text-slate-500">CIDR Notation</span>
                                        <span className="text-blue-600 font-bold">{data.from_unit}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <article className="mt-12 bg-white p-8 rounded-2xl border border-slate-200 shadow-sm prose prose-slate max-w-none">
                            <h2 className="text-xl font-bold text-slate-800 mb-4">Technical Explanation</h2>
                            <div className="text-slate-600 leading-relaxed" dangerouslySetInnerHTML={{ __html: data.seo_content }} />
                        </article>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
