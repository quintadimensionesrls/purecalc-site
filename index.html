<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [allTools, setAllTools] = useState([]);
            const [currentData, setCurrentData] = useState(null);
            const [isHome, setIsHome] = useState(true);
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                fetch('/data.json')
                    .then(res => res.json())
                    .then(json => {
                        setAllTools(json);
                        const pathSlug = window.location.pathname.split('/').pop();
                        const tool = json.find(t => t.slug === pathSlug);
                        
                        if (tool) {
                            setCurrentData(tool);
                            setIsHome(false);
                            document.title = tool.title + " | PureCalc.io";
                        } else {
                            setIsHome(true);
                            document.title = "PureCalc.io | Professional Calculators";
                        }
                    });
            }, []);

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            if (allTools.length === 0) return <div className="p-10 text-center">Loading...</div>;

            return (
                <div className="min-h-screen font-sans">
                    {/* NAVBAR */}
                    <nav className="bg-white border-b border-slate-200 p-4 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <a href="/" className="font-black text-xl text-blue-600">PureCalc.io</a>
                            <div className="flex gap-4 text-sm font-medium text-slate-500">
                                <a href="/" className="hover:text-blue-600">Home</a>
                            </div>
                        </div>
                    </nav>

                    {isHome ? (
                        /* VISTA HOME */
                        <div className="max-w-6xl mx-auto py-12 px-4">
                            <h1 className="text-4xl font-black text-slate-900 mb-8 text-center">All Professional Tools</h1>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {allTools.map(tool => (
                                    <a key={tool.slug} href={`/convert/${tool.slug}`} className="bg-white p-6 rounded-2xl border border-slate-200 hover:border-blue-400 shadow-sm transition-all group">
                                        <span className="text-[10px] font-bold text-blue-500 uppercase">Networking</span>
                                        <h2 className="text-lg font-bold text-slate-800 mt-2 group-hover:text-blue-600">{tool.title}</h2>
                                    </a>
                                ))}
                            </div>
                        </div>
                    ) : (
                        /* VISTA TOOL (CALCOLATORE) */
                        <main className="max-w-4xl mx-auto py-8 px-4">
                            <div className="bg-white border border-slate-200 rounded-2xl shadow-xl overflow-hidden">
                                <div className="p-6 border-b border-slate-100 bg-slate-50/50">
                                    <h1 className="text-3xl font-extrabold text-slate-800">{currentData.title}</h1>
                                </div>
                                <div className="p-8 flex flex-col md:flex-row justify-between items-center gap-10">
                                    <div>
                                        <label className="text-[10px] font-bold text-blue-500 uppercase">Subnet Mask</label>
                                        <div className="flex items-center gap-4">
                                            <code className="text-4xl font-mono font-bold">{currentData.data.mask}</code>
                                            <button onClick={() => copyToClipboard(currentData.data.mask)} className="p-2 bg-slate-100 rounded-lg">
                                                {copied ? "✅" : "📋"}
                                            </button>
                                        </div>
                                    </div>
                                    <div className="flex gap-10">
                                        <div><p className="text-xs text-slate-400">Total IPs</p><p className="text-xl font-bold">{currentData.data.hosts}</p></div>
                                        <div><p className="text-xs text-slate-400">Usable</p><p className="text-xl font-bold text-emerald-500">{currentData.data.usable}</p></div>
                                    </div>
                                </div>
                                <div className="p-6 bg-slate-900 text-emerald-400 font-mono text-sm">
                                    <p className="text-slate-500 text-xs mb-1 uppercase font-sans">Binary</p>
                                    {currentData.data.binary}
                                </div>
                            </div>
                            <article className="mt-8 bg-white p-8 rounded-2xl border border-slate-200 prose">
                                <h2 className="font-bold mb-4">Technical Explanation</h2>
                                <div dangerouslySetInnerHTML={{ __html: currentData.seo_content }} />
                            </article>
                        </main>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
