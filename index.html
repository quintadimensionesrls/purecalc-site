<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <title>PureCalc.io | Professional Tools</title>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [allTools, setAllTools] = useState([]);
            const [currentData, setCurrentData] = useState(null);
            const [isHome, setIsHome] = useState(true);
            const [copied, setCopied] = useState(false);

            useEffect(() => {
                fetch('/data.json')
                    .then(res => res.json())
                    .then(json => {
                        setAllTools(json);
                        const pathSlug = window.location.pathname.split('/').pop();
                        const tool = json.find(t => t.slug === pathSlug);
                        
                        if (tool) {
                            setCurrentData(tool);
                            setIsHome(false);
                            document.title = tool.title + " | PureCalc.io";
                        } else {
                            setIsHome(true);
                            document.title = "PureCalc.io | All Calculators";
                        }
                    });
            }, []);

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            if (allTools.length === 0) return <div className="p-20 text-center font-mono">Loading PureCalc Engine...</div>;

            return (
                <div className="min-h-screen flex flex-col">
                    {/* NAVBAR */}
                    <nav className="bg-white border-b border-slate-200 p-4 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <a href="/" className="font-black text-2xl text-blue-600 tracking-tighter">PureCalc<span className="text-slate-400">.io</span></a>
                            <div className="flex gap-6 text-sm font-bold text-slate-500 uppercase tracking-widest">
                                <a href="/" className="hover:text-blue-600 transition-colors">Home</a>
                            </div>
                        </div>
                    </nav>

                    <div className="flex-grow">
                        {isHome ? (
                            /* HOME PAGE */
                            <div className="max-w-6xl mx-auto py-16 px-4">
                                <div className="text-center mb-16">
                                    <h1 className="text-5xl font-black text-slate-900 mb-4">Professional Infrastructure Tools</h1>
                                    <p className="text-slate-500 text-lg">Fast, precise, and ad-free calculators for modern engineers.</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    {allTools.map(tool => (
                                        <a key={tool.slug} href={`/convert/${tool.slug}`} className="bg-white p-8 rounded-3xl border border-slate-200 hover:border-blue-500 hover:shadow-2xl hover:shadow-blue-100 transition-all group">
                                            <span className="text-[10px] font-black text-blue-500 uppercase tracking-widest bg-blue-50 px-2 py-1 rounded">{tool.category}</span>
                                            <h2 className="text-xl font-bold text-slate-800 mt-4 group-hover:text-blue-600">{tool.title}</h2>
                                            <p className="text-slate-400 text-sm mt-2">Professional high-precision converter for {tool.from_unit}.</p>
                                        </a>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            /* TOOL PAGE */
                            <main className="max-w-4xl mx-auto py-12 px-4">
                                <div className="bg-white border border-slate-200 rounded-[2.5rem] shadow-2xl overflow-hidden">
                                    <div className="p-8 border-b border-slate-100 bg-slate-50/50">
                                        <div className="flex items-center gap-2 mb-2">
                                            <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Live Calculator</span>
                                        </div>
                                        <h1 className="text-4xl font-black text-slate-900 tracking-tight">{currentData.title}</h1>
                                    </div>
                                    
                                    <div className="p-10 flex flex-col md:flex-row justify-between items-center gap-12">
                                        <div className="w-full md:w-auto text-center md:text-left">
                                            <label className="text-[10px] font-black text-blue-500 uppercase tracking-widest block mb-2">
                                                {currentData.category === 'networking' ? 'Subnet Mask' : 'Result'}
                                            </label>
                                            <div className="flex items-center justify-center md:justify-start gap-4">
                                                <code className="text-5xl font-mono font-black text-slate-900">{currentData.data.main_val}</code>
                                                <button onClick={() => copyToClipboard(currentData.data.main_val)} className="p-3 bg-slate-100 hover:bg-blue-600 hover:text-white rounded-2xl transition-all">
                                                    {copied ? "✅" : "📋"}
                                                </button>
                                            </div>
                                        </div>
                                        
                                        <div className="flex gap-12 border-l border-slate-100 pl-12 hidden md:flex">
                                            <div>
                                                <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">{currentData.data.label_1}</p>
                                                <p className="text-2xl font-black text-slate-800">{currentData.data.val_1}</p>
                                            </div>
                                            <div>
                                                <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">{currentData.data.label_2}</p>
                                                <p className="text-2xl font-black text-emerald-500">{currentData.data.val_2}</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="px-10 py-6 bg-slate-900 text-emerald-400 font-mono text-sm">
                                        <span className="text-slate-500 text-[10px] block mb-1 uppercase font-sans font-bold">Technical Details</span>
                                        {currentData.data.extra}
                                    </div>
                                </div>

                                <article className="mt-12 bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-sm prose prose-slate max-w-none">
                                    <h2 className="text-2xl font-black text-slate-800 mb-6">About this conversion</h2>
                                    <div className="text-slate-600 leading-relaxed" dangerouslySetInnerHTML={{ __html: currentData.seo_content }} />
                                </article>
                            </main>
                        )}
                    </div>

                    {/* FOOTER */}
                    <footer className="bg-white border-t border-slate-200 pt-16 pb-8">
                        <div className="max-w-6xl mx-auto px-4 text-center">
                            <div className="mb-8">
                                <a href="/" className="font-black text-xl text-blue-600 tracking-tighter">PureCalc.io</a>
                                <p className="text-slate-400 text-sm mt-2 max-w-md mx-auto">High-precision digital tools for the next generation of infrastructure experts.</p>
                            </div>
                            <div className="flex justify-center gap-8 mb-12 text-sm font-bold text-slate-500 uppercase tracking-widest">
                                <a href="/" className="hover:text-blue-600 transition-colors">Home</a>
                                <a href="/sitemap.xml" className="hover:text-blue-600 transition-colors">Sitemap</a>
                            </div>
                            <div className="pt-8 border-t border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4 text-slate-300 text-[10px] font-bold uppercase tracking-widest">
                                <p>© 2026 PureCalc.io - Precision Guaranteed</p>
                                <div className="flex gap-4">
                                    <span className="border border-slate-200 px-2 py-1 rounded">V 2.1.0</span>
                                    <span className="border border-slate-200 px-2 py-1 rounded">System Stable</span>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
